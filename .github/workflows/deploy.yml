name: CI & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (server + client)
        run: |
          for f in $(git ls-files '*.js' '*.mjs'); do
            node --check "$f"
          done

      - name: Generate PWA icons
        run: node server/generate-icons.js

      - name: Boot + health smoke test
        run: |
          cp .env.example .env
          NODE_NO_WARNINGS=1 node server/index.js & echo $! > server.pid
          ok=0
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then ok=1; break; fi
            sleep 1
          done
          kill "$(cat server.pid)" 2>/dev/null || true
          if [ "$ok" != "1" ]; then echo "Health check failed"; exit 1; fi
          echo "Service booted and healthy."

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "VPS secrets not configured — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Push model: the runner copies the code to the VPS over SSH.
      # The VPS never authenticates to GitHub, so no deploy key is needed —
      # only the VPS_* secrets below.
      - name: Set up SSH key
        if: steps.check.outputs.ready == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to VPS
        if: steps.check.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'data' --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ci -p ${VPS_PORT:-22} -o StrictHostKeyChecking=yes" \
            ./ "${VPS_USER}@${VPS_HOST}:/home/papernow/app/"

      - name: Install deps, restart and health check
        if: steps.check.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/id_ci -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            'bash /home/papernow/app/scripts/deploy.sh'
