# Proxy reverso para a área de membros Papernow.
# O certbot adiciona o bloco 443/SSL automaticamente ao rodar:
#   certbot --nginx -d areamembros.papernow.com.br
server {
    listen 80;
    listen [::]:80;
    server_name areamembros.papernow.com.br;

    client_max_body_size 30M;            # uploads de fotos do planner

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
