    <path d="M62 150 C76 143 84 132 86 118 C70 122 64 135 62 150Z"/>
    <path d="M66 112 C55 108 48 99 46 88 C59 92 65 100 66 112Z"/>
    <path d="M66 112 C78 106 85 96 86 85 C73 89 68 99 66 112Z"/>
