<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#efe6d6"/>
      <stop offset="0.55" stop-color="#e7dcc8"/>
      <stop offset="1" stop-color="#dfd2ba"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfbf6"/>
      <stop offset="1" stop-color="#f4ecdd"/>
